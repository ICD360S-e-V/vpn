name: Set Flutter build number
description: |
  Derive a strictly-monotonic build number from the semver in
  app/pubspec.yaml and rewrite the version line so that flutter build
  embeds it. Used by every Flutter build job in the matrix so that the
  source pubspec.yaml only carries the semver and CI is the single
  source of truth for the build number.

  Formula: MAJ*10000 + MIN*100 + PAT
    1.0.2 → 10002
    1.1.0 → 10100
    1.2.3 → 10203
    2.0.0 → 20000

  Why this formula:
    - Strictly increasing for any monotonic semver progression
      (release-please guarantees we never go backwards on main).
    - Zero state file to keep in sync (no risk of merge conflicts).
    - Stable across re-runs of the same tag — re-running the release
      workflow yields the same build number.
    - The auto-update mechanism in lib/src/api/update_service.dart
      compares strictly by build number (UpdateInfo.isNewerThan), so
      this monotonic guarantee is what makes auto-update reliable.

runs:
  using: composite
  steps:
    - name: Compute and inject build number
      shell: bash
      run: |
        set -e
        cd "$GITHUB_WORKSPACE/app"
        V=$(grep '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
        if ! echo "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "::error::could not parse semver from pubspec.yaml (got: '$V')"
          exit 1
        fi
        IFS=. read -r MAJ MIN PAT <<< "$V"
        B=$((MAJ * 10000 + MIN * 100 + PAT))
        # Cross-platform sed -i: -i.bak works on both GNU and BSD,
        # then we delete the backup file.
        sed -i.bak -E "s|^version:.*|version: ${V}+${B}|" pubspec.yaml
        rm -f pubspec.yaml.bak
        echo "::notice::Flutter version=${V}+${B}"
        head -10 pubspec.yaml
