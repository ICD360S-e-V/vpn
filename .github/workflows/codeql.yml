name: CodeQL

# GitHub-managed static analysis. Free for public repos. Scans Go
# (the agent) and JavaScript (the GitHub Actions YAML embedded
# JS/TS in third-party actions). Flutter/Dart is not yet a
# first-class CodeQL language; we rely on `flutter analyze` in the
# main flutter.yml workflow for app-side static checking.
#
# Findings land in the Security → Code scanning tab and as PR
# review comments. Critical/high findings can optionally block
# merge via branch protection.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-tree scan on a quiet hour, in case a new CodeQL
    # rule lands that flags previously-clean code.
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  # Required to write findings into the Security tab.
  security-events: write
  # Read source.
  contents: read
  # Read PR metadata.
  actions: read

jobs:
  analyze:
    name: CodeQL ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: agent/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Pull the security-extended + security-and-quality
          # query packs on top of the default. Slower but catches
          # more.
          queries: security-extended,security-and-quality

      - name: Build (Go autobuild)
        if: matrix.language == 'go'
        uses: github/codeql-action/autobuild@v4
        with:
          working-directory: agent

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
