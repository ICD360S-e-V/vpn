name: Release Please

# Auto-versioning + auto-CHANGELOG, M7.5.
#
# How this fits into the existing release pipeline:
#
#   1. Every push to main runs this workflow.
#   2. release-please reads commits since the last tag and decides if
#      a release is needed (any commit with `feat:` / `fix:` /
#      `perf:` / `BREAKING CHANGE:`). If so, it opens (or updates)
#      a PR titled `chore(main): release X.Y.Z` containing:
#        - the new CHANGELOG.md section with auto-generated bullets
#          grouped by Conventional Commit type
#        - the bumped version in version.txt and app/pubspec.yaml
#          (the `# x-release-please-version` annotation makes
#          release-please's "generic" updater touch only that one
#          line in pubspec)
#        - the bumped manifest entry in .release-please-manifest.json
#   3. We review/merge the Release PR. release-please then creates
#      the git tag `vX.Y.Z` and a GitHub Release entry.
#   4. The tag push fires .github/workflows/flutter.yml AND
#      .github/workflows/agent.yml on `v*`, which run the existing
#      build matrix + deploy steps. Build number is derived from the
#      semver via .github/actions/set-build-number, so the auto-update
#      mechanism in the app sees a strictly-greater build value.
#
# Build-number policy: monotonic from semver, computed in CI as
# MAJ*10000 + MIN*100 + PAT. The pubspec source-of-truth holds only
# the semver (no `+N`); the composite action injects `+N` immediately
# before `flutter build`. This avoids drift between developer local
# state and CI state.
#
# Commit message → bump table:
#   feat:           → minor (1.0.2 → 1.1.0)
#   fix: / perf:    → patch (1.0.2 → 1.0.3)
#   feat!: / BREAKING CHANGE in footer → major
#   chore: / docs: / ci: / refactor: / style: / test: / build: → no release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Why we run the release-please NPM CLI directly instead of using
# googleapis/release-please-action@v4: that action's action.yml still
# declares `using: node20`, which makes every workflow run print a
# Node.js 20 deprecation banner even when FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
# coerces it to actually run on Node 24. GitHub does NOT suppress
# the banner — the warning appears regardless. The only way to get
# rid of it is to bypass the action entirely.
#
# `setup-node@v5` + `npx release-please` is a clean Node 24 install
# under our control. Same underlying tool, same configuration, no
# wrapper.

jobs:
  release-please:
    name: Open / merge release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      # Use a PAT instead of GITHUB_TOKEN because the enterprise
      # policy blocks Actions from creating pull requests with the
      # built-in token. The PAT is stored as RELEASE_PLEASE_TOKEN.
      - name: Run release-please manifest-pr (open / update Release PR)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -e
          npx --yes release-please@latest manifest-pr \
            --token="$GITHUB_TOKEN" \
            --repo-url="$GITHUB_REPOSITORY" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json

      - name: Run release-please manifest-release (cut tag + GitHub Release on PR merge)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -e
          npx --yes release-please@latest manifest-release \
            --token="$GITHUB_TOKEN" \
            --repo-url="$GITHUB_REPOSITORY" \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json
