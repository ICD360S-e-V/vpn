name: Agent build + deploy

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'
  pull_request:
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'
  workflow_dispatch:

jobs:
  test:
    name: vet + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: agent/go.sum
      - run: go version
      - run: go mod download
      - run: go vet ./...
      - run: go test ./...

  build:
    name: build static linux/amd64
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      # M7.10: SLSA build provenance via attest-build-provenance.
      # See the matching block in flutter.yml for the rationale.
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: agent/go.sum

      - name: Read version
        id: ver
        run: |
          v=$(git describe --tags --always --dirty 2>/dev/null || echo "dev-${GITHUB_SHA::8}")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build static binary
        env:
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o vpn-agent ./cmd/vpn-agent
          file vpn-agent
          ls -la vpn-agent

      - name: Generate SLSA build provenance attestation
        # Cryptographic supply-chain proof for the agent binary.
        # Verify with: gh attestation verify vpn-agent --owner ICD360S-e-V
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: agent/vpn-agent

      - uses: actions/upload-artifact@v7
        with:
          name: vpn-agent-linux-amd64
          path: agent/vpn-agent
          if-no-files-found: error

  deploy:
    name: Deploy to vpn.icd360s.de
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    # NOTE: this job intentionally does NOT inherit
    # `defaults.run.working-directory: agent` from the workflow
    # level (which is why test/build override it on a per-job basis
    # above). The deploy job works from the repo root so the
    # download-artifact path and the rsync stage paths are
    # unambiguous. Same M6.5 lesson the Flutter workflow learned.
    steps:
      - uses: actions/checkout@v6

      - name: Download built binary
        uses: actions/download-artifact@v8
        with:
          name: vpn-agent-linux-amd64
          path: dist

      - name: Deploy via SSH (rsync into vpn-deploy drop dir)
        if: env.VPN_DEPLOY_SSH_KEY != ''
        env:
          VPN_DEPLOY_SSH_KEY: ${{ secrets.VPN_DEPLOY_SSH_KEY }}
          VPN_DEPLOY_SSH_PORT: ${{ secrets.VPN_DEPLOY_SSH_PORT }}
          VPN_DEPLOY_SSH_USER: ${{ secrets.VPN_DEPLOY_SSH_USER }}
          VPN_DEPLOY_SSH_HOST: ${{ secrets.VPN_DEPLOY_SSH_HOST }}
        run: |
          set -e
          ls -la dist/
          chmod +x dist/vpn-agent
          file dist/vpn-agent

          mkdir -p ~/.ssh
          echo "$VPN_DEPLOY_SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          PORT="${VPN_DEPLOY_SSH_PORT:-36000}"
          USER="${VPN_DEPLOY_SSH_USER:-vpn-deploy}"
          HOST="${VPN_DEPLOY_SSH_HOST:-vpn.icd360s.de}"
          ssh-keyscan -p "$PORT" -t ed25519 "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # The vpn-deploy user has rrsync -wo /var/www/html. We drop
          # the new binary at /var/www/html/_agent_drop/vpn-agent;
          # a systemd path unit on the server (vpn-agent-deploy.path)
          # detects the file, validates it's an ELF, installs to
          # /usr/local/sbin/vpn-agent, restarts vpn-agent.service,
          # and removes the drop file. End-to-end CI → live in ~10s.
          mkdir -p stage/_agent_drop
          cp dist/vpn-agent stage/_agent_drop/vpn-agent
          rsync -rlvz --no-times --no-owner --no-group --no-perms \
            -e "ssh -i ~/.ssh/deploy -p $PORT -o StrictHostKeyChecking=accept-new" \
            stage/_agent_drop \
            "$USER@$HOST:."
