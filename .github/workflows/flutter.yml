name: Flutter app build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  analyze:
    name: Analyze (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter create --platforms=linux --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter analyze --no-pub
      - run: flutter test --no-pub --reporter=expanded
        if: hashFiles('test/**/*.dart') != ''

  build_linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=linux --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: icd360svpn-linux-x64
          path: app/build/linux/x64/release/bundle/

  build_macos:
    name: Build (macos)
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=macos --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      # Note: `flutter build macos` does NOT accept --no-codesign
      # (that flag exists only for `build ios` / `build ipa`). On a
      # vanilla macos-latest runner there is no developer identity
      # installed, so xcodebuild produces an unsigned .app and the
      # build succeeds. Notarisation will land in M8.
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: icd360svpn-macos
          path: app/build/macos/Build/Products/Release/icd360svpn.app/

  build_windows:
    name: Build (windows)
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=windows --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: icd360svpn-windows-x64
          path: app/build/windows/x64/runner/Release/
