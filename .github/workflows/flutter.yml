name: Flutter app build

on:
  # M7.6: build ONLY on version tags + PRs. Pushing to main no longer
  # runs the 6-job matrix because every meaningful release is gated
  # by an explicit tag (manual today, release-please tomorrow), so
  # the smoke build on main was duplicating work for nothing —
  # 10+ minutes of CI per push to no end. PRs still get a smoke
  # build as the safety net before merge.
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

# Action versions notes (M6.5):
#   actions/checkout@v6           ships node24 natively
#   actions/setup-java@v5         ships node24 natively
#   actions/upload-artifact@v7    ships node24 natively
#   actions/download-artifact@v8  ships node24 natively
#   subosito/flutter-action@v2    composite action, no node runtime
#   softprops/action-gh-release@v2 ships node24 natively
# After bumping all of the above to their node24-native lines, the
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env var is no longer needed —
# every job genuinely runs on Node 24.

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint + analyze.
  # ─────────────────────────────────────────────────────────────
  analyze:
    name: Analyze (ubuntu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter create --platforms=linux --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter analyze --no-pub
      - run: flutter test --no-pub --reporter=expanded
        if: hashFiles('test/**/*.dart') != ''

  # ─────────────────────────────────────────────────────────────
  # Desktop builds.
  # ─────────────────────────────────────────────────────────────
  build_linux:
    name: Build Linux (deb + bundle)
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev \
            dpkg-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: ./.github/actions/set-build-number
      - run: flutter create --platforms=linux --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Read version
        id: ver
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Package .deb
        run: |
          set -e
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE=deb-pkg
          rm -rf "$STAGE"
          mkdir -p "$STAGE/usr/lib/icd360svpn" "$STAGE/usr/bin" "$STAGE/DEBIAN" \
                   "$STAGE/usr/share/applications"
          cp -r build/linux/x64/release/bundle/* "$STAGE/usr/lib/icd360svpn/"
          cat > "$STAGE/usr/bin/icd360svpn" <<'EOF'
          #!/bin/sh
          exec /usr/lib/icd360svpn/icd360svpn "$@"
          EOF
          chmod +x "$STAGE/usr/bin/icd360svpn"
          cat > "$STAGE/usr/share/applications/icd360svpn.desktop" <<EOF
          [Desktop Entry]
          Name=ICD360S VPN
          Comment=Admin app for the ICD360S WireGuard VPN
          Exec=icd360svpn
          Type=Application
          Categories=Network;Utility;
          StartupNotify=true
          EOF
          cat > "$STAGE/DEBIAN/control" <<EOF
          Package: icd360svpn
          Version: $VERSION
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libsecret-1-0
          Maintainer: ICD360S e.V. <github@icd360s.de>
          Description: ICD360S WireGuard VPN admin app (Flutter)
           Native desktop client for managing the ICD360S VPN server
           via mTLS over the WireGuard tunnel.
          EOF
          dpkg-deb --build "$STAGE" "icd360svpn-${VERSION}-amd64.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: app/icd360svpn-*-amd64.deb

  build_macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: ./.github/actions/set-build-number
      - run: flutter create --platforms=macos --project-name icd360svpn --org de.icd360s .
      - name: Overwrite macOS entitlements with network.client
        # Flutter's default macos/Runner/Release.entitlements contains
        # ONLY `com.apple.security.app-sandbox`. No `network.client`.
        # That means a sandboxed macOS Flutter app cannot make ANY
        # outbound network call: dart:io HttpClient gets
        # `Failed host lookup: <host>` because the sandbox blocks
        # the resolver before DNS even runs. We MUST add the
        # entitlement, otherwise enroll, auto-update, and changelog
        # all silently fail with DNS errors.
        #
        # The earlier (v1.2.1) attempt used `plutil -insert ... -bool YES`
        # which the macos-latest plutil rejected with "Value YES not
        # valid for key path", and the `|| echo` fallback swallowed
        # the error so we shipped a broken DMG anyway. The bulletproof
        # fix is to just overwrite the file with a known-good plist
        # via heredoc — we control the full content, no plutil
        # quirks, no shell escaping.
        run: |
          set -e
          cat > macos/Runner/Release.entitlements <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.app-sandbox</key>
          	<true/>
          	<key>com.apple.security.network.client</key>
          	<true/>
          </dict>
          </plist>
          PLIST
          cat > macos/Runner/DebugProfile.entitlements <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.app-sandbox</key>
          	<true/>
          	<key>com.apple.security.cs.allow-jit</key>
          	<true/>
          	<key>com.apple.security.network.server</key>
          	<true/>
          	<key>com.apple.security.network.client</key>
          	<true/>
          </dict>
          </plist>
          PLIST
          echo "--- Release.entitlements ---"
          cat macos/Runner/Release.entitlements
          echo "--- DebugProfile.entitlements ---"
          cat macos/Runner/DebugProfile.entitlements
          # Hard fail if for some reason the keys are missing
          grep -q 'com.apple.security.network.client' macos/Runner/Release.entitlements
          grep -q 'com.apple.security.network.client' macos/Runner/DebugProfile.entitlements
          echo "::notice::macOS entitlements include network.client"
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Read version
        id: ver
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Package .dmg
        run: |
          set -e
          brew install create-dmg
          VERSION="${{ steps.ver.outputs.version }}"
          APP="build/macos/Build/Products/Release/icd360svpn.app"
          create-dmg \
            --volname "ICD360S VPN $VERSION" \
            --window-pos 200 120 \
            --window-size 600 320 \
            --icon-size 96 \
            --icon "icd360svpn.app" 160 130 \
            --hide-extension "icd360svpn.app" \
            --app-drop-link 440 130 \
            --no-internet-enable \
            "icd360svpn-${VERSION}.dmg" \
            "$APP"

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: app/icd360svpn-*.dmg

  build_windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: ./.github/actions/set-build-number
      - run: flutter create --platforms=windows --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Read version
        id: ver
        shell: bash
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Package .zip
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath "icd360svpn-$version-windows-x64.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: app/icd360svpn-*-windows-x64.zip

  build_android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: ./.github/actions/set-build-number
      - run: flutter create --platforms=android --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get

      # The app uses zero proprietary Google services so the same
      # universal APK works for sideload, Huawei AppGallery, Samsung
      # Galaxy Store, and Google Play (sideload). The AAB is what
      # Google Play Console wants for in-store distribution. F-Droid
      # builds from source on their own infra; we don't ship a binary
      # for them.
      - run: flutter build apk --release
      - run: flutter build apk --release --split-per-abi
      - run: flutter build appbundle --release

      - name: Read version
        id: ver
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts
        run: |
          mkdir -p android-out
          V="${{ steps.ver.outputs.version }}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "android-out/icd360svpn-${V}-universal.apk"
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$src" ]; then
              cp "$src" "android-out/icd360svpn-${V}-${abi}.apk"
            fi
          done
          cp build/app/outputs/bundle/release/app-release.aab \
             "android-out/icd360svpn-${V}.aab"

      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: app/android-out/

  build_ios:
    name: Build iOS (.app, unsigned)
    runs-on: macos-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: ./.github/actions/set-build-number
      - run: flutter create --platforms=ios --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Read version
        id: ver
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # Pre-package Runner.app as a tarball BEFORE upload. Otherwise
      # actions/upload-artifact uploads the directory contents flat
      # (no top-level Runner.app/), which makes the release-time
      # tarball impossible.
      - name: Package iOS .app as tarball
        run: |
          set -e
          VERSION="${{ steps.ver.outputs.version }}"
          tar -C build/ios/iphoneos -czf \
              "icd360svpn-${VERSION}-ios-unsigned.tar.gz" \
              Runner.app

      - uses: actions/upload-artifact@v7
        with:
          name: ios
          path: app/icd360svpn-*-ios-unsigned.tar.gz

  # ─────────────────────────────────────────────────────────────
  # Release job — only on `v*` tags. Downloads every artifact,
  # computes SHA256, generates version.json, creates a GitHub
  # Release, and rsyncs to vpn.icd360s.de.
  # ─────────────────────────────────────────────────────────────
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_linux
      - build_macos
      - build_windows
      - build_android
      - build_ios
    permissions:
      contents: write
    # NOTE: this job intentionally does NOT inherit defaults.run.working-directory
    # = app from individual build jobs. We work from the repo root here so the
    # paths to dist/ and out/ are unambiguous.
    steps:
      - uses: actions/checkout@v6

      - name: Read version from pubspec
        id: ver
        run: |
          set -e
          # The source pubspec carries the SEMVER ONLY (the build
          # number is derived in CI by .github/actions/set-build-number
          # from MAJ*10000 + MIN*100 + PAT). Same derivation here so
          # version.json reports the value the binaries actually shipped
          # with.
          v=$(grep '^version:' app/pubspec.yaml | sed -E 's/version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if ! echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::could not parse semver from pubspec.yaml (got: '$v')"
            exit 1
          fi
          IFS=. read -r MAJ MIN PAT <<< "$v"
          b=$((MAJ * 10000 + MIN * 100 + PAT))
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "build=$b" >> "$GITHUB_OUTPUT"
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "::notice::pubspec version=$v build=$b tag=$tag"
          if [ "v$v" != "$tag" ]; then
            echo "::warning::tag $tag does not match pubspec version v$v"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Inspect downloaded layout
        run: find dist -type f | sort

      - name: Layout files for upload + manifest
        run: |
          set -e
          V="${{ steps.ver.outputs.version }}"
          if [ -z "$V" ]; then
            echo "::error::version is empty — Read version step failed"
            exit 1
          fi
          mkdir -p out/download/vpn-management_icd360sev/{linux,macos,windows,android,ios}

          # linux
          cp dist/linux/*.deb out/download/vpn-management_icd360sev/linux/

          # macos
          cp dist/macos/*.dmg out/download/vpn-management_icd360sev/macos/

          # windows
          cp dist/windows/*.zip out/download/vpn-management_icd360sev/windows/

          # android — universal apk + 3 split apks + aab
          cp dist/android/* out/download/vpn-management_icd360sev/android/

          # ios — already pre-packaged as a tarball by build_ios
          cp dist/ios/icd360svpn-*-ios-unsigned.tar.gz \
             out/download/vpn-management_icd360sev/ios/

          find out -type f | sort

      - name: Compute SHA256 sums
        working-directory: ${{ github.workspace }}/out
        run: |
          find download -type f -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate version.json
        run: |
          set -e
          V="${{ steps.ver.outputs.version }}"
          B="${{ steps.ver.outputs.build }}"
          mkdir -p out/updates

          # First filename in each platform dir + matching SHA256.
          first_in() {
            local dir="$1"
            ls "out/download/vpn-management_icd360sev/$dir" 2>/dev/null | head -1 || true
          }
          sha_for() {
            sha256sum "$1" | awk '{print $1}'
          }
          json_field() {
            local platform="$1"
            local fname
            fname=$(first_in "$platform")
            if [ -z "$fname" ]; then
              echo "null"
              return
            fi
            local sha
            sha=$(sha_for "out/download/vpn-management_icd360sev/$platform/$fname")
            printf '{"url": "https://vpn.icd360s.de/download/vpn-management_icd360sev/%s/%s", "sha256": "%s"}' "$platform" "$fname" "$sha"
          }

          # Pull the matching version section out of CHANGELOG.md.
          changelog_lines() {
            awk -v ver="$V" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/ { exit }
              capture && /^- / {
                gsub(/^- /, "")
                gsub(/"/, "\\\"")
                printf "%s\"%s\"", (n++ ? "," : ""), $0
              }
            ' CHANGELOG.md
          }
          changelog=$(changelog_lines)
          if [ -z "$changelog" ]; then
            changelog="\"Release $V\""
          fi

          released_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "{"
            echo "  \"version\": \"$V\","
            echo "  \"build\": $B,"
            echo "  \"released_at\": \"$released_at\","
            echo "  \"platforms\": {"
            echo "    \"linux\":   $(json_field linux),"
            echo "    \"macos\":   $(json_field macos),"
            echo "    \"windows\": $(json_field windows),"
            echo "    \"android\": $(json_field android),"
            echo "    \"ios\":     $(json_field ios)"
            echo "  },"
            echo "  \"changelog\": [$changelog]"
            echo "}"
          } > out/updates/version.json
          cat out/updates/version.json
          python3 -c 'import json, sys; json.load(open("out/updates/version.json"))'

      - name: Publish CHANGELOG.md alongside version.json
        # The Flutter app fetches this URL when the user taps the
        # version label in the footer / Settings (M7.5 ChangelogScreen).
        # Source-of-truth is the auto-generated CHANGELOG at the repo
        # root, written by release-please. We just copy it into the
        # same out/updates/ tree that gets rsynced to nginx so it ends
        # up at https://vpn.icd360s.de/updates/CHANGELOG.md.
        run: |
          set -e
          cp CHANGELOG.md out/updates/CHANGELOG.md
          ls -la out/updates/

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Native gh CLI replaces softprops/action-gh-release@v2 — that
        # action's master is still on Node.js 20 as of April 2026 and
        # the maintainer has not bumped it. gh CLI is pre-installed on
        # every GitHub runner and uses no JavaScript runtime, so the
        # Node 20 deprecation annotation goes away entirely.
        #
        # Idempotency: if a previous workflow run created the release
        # (unlikely but possible on a re-run), `gh release create`
        # exits non-zero and we fall back to `gh release upload
        # --clobber` to refresh the assets in place.
        run: |
          set -e
          TAG="${{ steps.ver.outputs.tag }}"

          ASSETS=(
            out/download/vpn-management_icd360sev/linux/*
            out/download/vpn-management_icd360sev/macos/*
            out/download/vpn-management_icd360sev/windows/*
            out/download/vpn-management_icd360sev/android/*
            out/download/vpn-management_icd360sev/ios/*
            out/updates/version.json
            out/SHA256SUMS.txt
          )

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::release $TAG already exists, refreshing assets"
            gh release upload "$TAG" --clobber --repo "$GITHUB_REPOSITORY" "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

      - name: Deploy to vpn.icd360s.de via SSH (if secret present)
        if: env.VPN_DEPLOY_SSH_KEY != ''
        env:
          VPN_DEPLOY_SSH_KEY: ${{ secrets.VPN_DEPLOY_SSH_KEY }}
          VPN_DEPLOY_SSH_PORT: ${{ secrets.VPN_DEPLOY_SSH_PORT }}
          VPN_DEPLOY_SSH_USER: ${{ secrets.VPN_DEPLOY_SSH_USER }}
          VPN_DEPLOY_SSH_HOST: ${{ secrets.VPN_DEPLOY_SSH_HOST }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$VPN_DEPLOY_SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          PORT="${VPN_DEPLOY_SSH_PORT:-36000}"
          USER="${VPN_DEPLOY_SSH_USER:-vpn-deploy}"
          HOST="${VPN_DEPLOY_SSH_HOST:-vpn.icd360s.de}"
          ssh-keyscan -p "$PORT" -t ed25519 "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # See docs/vpn-server-setup.md for the rrsync gotchas:
          #   - destination must be `:.` (rrsync rejects absolute `/`)
          #   - --delete is incompatible with -wo write-only mode
          #   - --no-times --no-owner --no-group --no-perms because the
          #     deploy user has no rights to chown
          rsync -rlvz --no-times --no-owner --no-group --no-perms \
            -e "ssh -i ~/.ssh/deploy -p $PORT -o StrictHostKeyChecking=accept-new" \
            ${{ github.workspace }}/out/ \
            "$USER@$HOST:."
