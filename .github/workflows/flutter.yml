name: Flutter app build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'agent/**'
      - 'docs/**'
      - 'CHANGELOG.md'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: app

env:
  # Force every JavaScript action to run on Node.js 24 even if its
  # manifest still declares "node20" (actions/upload-artifact@v5 is
  # the current culprit). Drops a no-op once Node 24 becomes the
  # GHA default in June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint + analyze.
  # ─────────────────────────────────────────────────────────────
  analyze:
    name: Analyze (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter create --platforms=linux --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter analyze --no-pub
      - run: flutter test --no-pub --reporter=expanded
        if: hashFiles('test/**/*.dart') != ''

  # ─────────────────────────────────────────────────────────────
  # Desktop builds.
  # ─────────────────────────────────────────────────────────────
  build_linux:
    name: Build Linux (deb + bundle)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev \
            dpkg-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=linux --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Read version
        id: ver
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Package .deb
        run: |
          set -e
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE=deb-pkg
          rm -rf "$STAGE"
          mkdir -p "$STAGE/usr/lib/icd360svpn" "$STAGE/usr/bin" "$STAGE/DEBIAN" \
                   "$STAGE/usr/share/applications"
          cp -r build/linux/x64/release/bundle/* "$STAGE/usr/lib/icd360svpn/"
          cat > "$STAGE/usr/bin/icd360svpn" <<'EOF'
          #!/bin/sh
          exec /usr/lib/icd360svpn/icd360svpn "$@"
          EOF
          chmod +x "$STAGE/usr/bin/icd360svpn"
          cat > "$STAGE/usr/share/applications/icd360svpn.desktop" <<EOF
          [Desktop Entry]
          Name=ICD360S VPN
          Comment=Admin app for the ICD360S WireGuard VPN
          Exec=icd360svpn
          Type=Application
          Categories=Network;Utility;
          StartupNotify=true
          EOF
          cat > "$STAGE/DEBIAN/control" <<EOF
          Package: icd360svpn
          Version: $VERSION
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libsecret-1-0
          Maintainer: ICD360S e.V. <github@icd360s.de>
          Description: ICD360S WireGuard VPN admin app (Flutter)
           Native desktop client for managing the ICD360S VPN server
           via mTLS over the WireGuard tunnel.
          EOF
          dpkg-deb --build "$STAGE" "icd360svpn-${VERSION}-amd64.deb"

      - uses: actions/upload-artifact@v5
        with:
          name: linux
          path: |
            app/icd360svpn-*-amd64.deb

  build_macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=macos --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Read version
        id: ver
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Package .dmg
        run: |
          set -e
          brew install create-dmg
          VERSION="${{ steps.ver.outputs.version }}"
          APP="build/macos/Build/Products/Release/icd360svpn.app"
          create-dmg \
            --volname "ICD360S VPN $VERSION" \
            --window-pos 200 120 \
            --window-size 600 320 \
            --icon-size 96 \
            --icon "icd360svpn.app" 160 130 \
            --hide-extension "icd360svpn.app" \
            --app-drop-link 440 130 \
            --no-internet-enable \
            "icd360svpn-${VERSION}.dmg" \
            "$APP"

      - uses: actions/upload-artifact@v5
        with:
          name: macos
          path: app/icd360svpn-*.dmg

  build_windows:
    name: Build Windows (.zip)
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=windows --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Read version
        id: ver
        shell: bash
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Package .zip
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath "icd360svpn-$version-windows-x64.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: windows
          path: app/icd360svpn-*-windows-x64.zip

  build_android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=android --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get

      # The app uses zero proprietary Google services so the same
      # universal APK works for sideload, Huawei AppGallery, Samsung
      # Galaxy Store, and Google Play (sideload). The AAB is what
      # Google Play Console wants for in-store distribution. F-Droid
      # builds from source on their own infra; we don't ship a binary
      # for them.
      - run: flutter build apk --release
      - run: flutter build apk --release --split-per-abi
      - run: flutter build appbundle --release

      - name: Read version
        id: ver
        run: |
          v=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([^+]+).*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts
        run: |
          mkdir -p android-out
          V="${{ steps.ver.outputs.version }}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "android-out/icd360svpn-${V}-universal.apk"
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$src" ]; then
              cp "$src" "android-out/icd360svpn-${V}-${abi}.apk"
            fi
          done
          cp build/app/outputs/bundle/release/app-release.aab \
             "android-out/icd360svpn-${V}.aab"

      - uses: actions/upload-artifact@v5
        with:
          name: android
          path: app/android-out/

  build_ios:
    name: Build iOS (.app, unsigned)
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter create --platforms=ios --project-name icd360svpn --org de.icd360s .
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v5
        with:
          name: ios
          path: app/build/ios/iphoneos/Runner.app/

  # ─────────────────────────────────────────────────────────────
  # Release job: only runs on tag pushes (`v1.2.3`). Downloads
  # every artifact from the build matrix, computes SHA256 sums,
  # writes the version.json manifest, and:
  #   1. Uploads everything to GitHub Releases.
  #   2. Pushes everything to nginx on vpn.icd360s.de via SSH if
  #      the VPN_DEPLOY_SSH_KEY secret is set.
  # ─────────────────────────────────────────────────────────────
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_linux
      - build_macos
      - build_windows
      - build_android
      - build_ios
    permissions:
      contents: write   # for softprops/action-gh-release
    steps:
      - uses: actions/checkout@v5

      - name: Read version from pubspec
        id: ver
        run: |
          v=$(grep '^version:' app/pubspec.yaml | sed -E 's/version: *([^+]+)\+([0-9]+).*/\1/')
          b=$(grep '^version:' app/pubspec.yaml | sed -E 's/version: *([^+]+)\+([0-9]+).*/\2/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "build=$b" >> "$GITHUB_OUTPUT"
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [ "v$v" != "$tag" ]; then
            echo "::warning::tag $tag does not match pubspec version v$v"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Layout files for upload + manifest
        id: layout
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          V="${{ steps.ver.outputs.version }}"
          mkdir -p out/download/vpn-management_icd360sev/{linux,macos,windows,android,ios}

          # linux
          if ls dist/linux/*.deb >/dev/null 2>&1; then
            cp dist/linux/*.deb out/download/vpn-management_icd360sev/linux/
          fi
          # macos
          if ls dist/macos/*.dmg >/dev/null 2>&1; then
            cp dist/macos/*.dmg out/download/vpn-management_icd360sev/macos/
          fi
          # windows
          if ls dist/windows/*.zip >/dev/null 2>&1; then
            cp dist/windows/*.zip out/download/vpn-management_icd360sev/windows/
          fi
          # android — copy the entire android-out tree
          if [ -d dist/android ]; then
            cp dist/android/* out/download/vpn-management_icd360sev/android/
          fi
          # ios — pack the .app as a tarball since GitHub Releases
          # cannot host directories
          if [ -d dist/ios ]; then
            tar -C dist/ios -czf out/download/vpn-management_icd360sev/ios/icd360svpn-${V}-ios-unsigned.tar.gz Runner.app
          fi

          echo "release_dir=$(pwd)/out" >> "$GITHUB_OUTPUT"
          find out -type f | sort

      - name: Compute SHA256 sums
        working-directory: ${{ github.workspace }}/out
        run: |
          find download -type f -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate version.json
        id: manifest
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          V="${{ steps.ver.outputs.version }}"
          B="${{ steps.ver.outputs.build }}"
          mkdir -p out/updates

          # Pluck the first file in each platform dir + its sha256.
          first_in() {
            local dir="$1"
            ls "out/download/vpn-management_icd360sev/$dir" 2>/dev/null | head -1 || true
          }
          sha_for() {
            local file="$1"
            sha256sum "$file" | awk '{print $1}'
          }

          json_field() {
            local platform="$1"
            local fname
            fname=$(first_in "$platform")
            if [ -z "$fname" ]; then
              echo "null"
              return
            fi
            local sha
            sha=$(sha_for "out/download/vpn-management_icd360sev/$platform/$fname")
            printf '{"url": "https://vpn.icd360s.de/download/vpn-management_icd360sev/%s/%s", "sha256": "%s"}' "$platform" "$fname" "$sha"
          }

          # Pull the unreleased changelog bullets out of CHANGELOG.md
          # for the matching version section. Falls back to a single
          # generic line if nothing matches.
          changelog_lines() {
            awk -v ver="$V" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/ { exit }
              capture && /^- / {
                gsub(/^- /, "")
                gsub(/"/, "\\\"")
                printf "%s\"%s\"", (n++ ? "," : ""), $0
              }
            ' CHANGELOG.md
          }

          changelog=$(changelog_lines)
          if [ -z "$changelog" ]; then
            changelog="\"Release $V\""
          fi

          released_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "{"
            echo "  \"version\": \"$V\","
            echo "  \"build\": $B,"
            echo "  \"released_at\": \"$released_at\","
            echo "  \"platforms\": {"
            echo "    \"linux\":   $(json_field linux),"
            echo "    \"macos\":   $(json_field macos),"
            echo "    \"windows\": $(json_field windows),"
            echo "    \"android\": $(json_field android),"
            echo "    \"ios\":     $(json_field ios)"
            echo "  },"
            echo "  \"changelog\": [$changelog]"
            echo "}"
          } > out/updates/version.json
          cat out/updates/version.json
          # Validate JSON
          python3 -c 'import json, sys; json.load(open("out/updates/version.json"))'

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            out/download/vpn-management_icd360sev/linux/*
            out/download/vpn-management_icd360sev/macos/*
            out/download/vpn-management_icd360sev/windows/*
            out/download/vpn-management_icd360sev/android/*
            out/download/vpn-management_icd360sev/ios/*
            out/updates/version.json
            out/SHA256SUMS.txt

      - name: Deploy to vpn.icd360s.de via SSH (if secret present)
        if: env.VPN_DEPLOY_SSH_KEY != ''
        env:
          VPN_DEPLOY_SSH_KEY: ${{ secrets.VPN_DEPLOY_SSH_KEY }}
          VPN_DEPLOY_SSH_PORT: ${{ secrets.VPN_DEPLOY_SSH_PORT }}
          VPN_DEPLOY_SSH_USER: ${{ secrets.VPN_DEPLOY_SSH_USER }}
          VPN_DEPLOY_SSH_HOST: ${{ secrets.VPN_DEPLOY_SSH_HOST }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$VPN_DEPLOY_SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          PORT="${VPN_DEPLOY_SSH_PORT:-36000}"
          USER="${VPN_DEPLOY_SSH_USER:-vpn-deploy}"
          HOST="${VPN_DEPLOY_SSH_HOST:-vpn.icd360s.de}"
          ssh-keyscan -p "$PORT" -t ed25519 "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # rsync the entire output tree. The remote shell is locked
          # to `rrsync -wo /var/www/html` (see docs/vpn-server-setup.md).
          # Three rrsync gotchas:
          #
          # 1. The destination MUST be `:.` (relative to the rrsync
          #    root) — `:/` is rejected as an unsafe absolute path.
          #
          # 2. --delete is incompatible with -wo (write-only) mode
          #    because rrsync forbids any client-driven listing of
          #    the destination. Old release artifacts therefore
          #    accumulate on the server; that's fine because the
          #    filenames are content-addressed by version.
          #
          # 3. -avz preserves times/owners/perms which the remote
          #    rrsync rejects since the deploy user has no rights
          #    to chown. We override with --no-times --no-owner
          #    --no-group --no-perms.
          rsync -rlvz --no-times --no-owner --no-group --no-perms \
            -e "ssh -i ~/.ssh/deploy -p $PORT -o StrictHostKeyChecking=accept-new" \
            ${{ github.workspace }}/out/ \
            "$USER@$HOST:."
