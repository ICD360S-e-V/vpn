name: icd360svpn
description: macOS / desktop admin app for the ICD360S WireGuard VPN server.
publish_to: 'none'
# Source-of-truth: SEMVER ONLY. release-please bumps this line via the
# `# x-release-please-version` annotation marker. The build number is
# DERIVED in CI from the semver (MAJ*10000 + MIN*100 + PAT) by the
# composite action .github/actions/set-build-number, which sed-rewrites
# this line just before `flutter build` runs in each platform job.
# Local `flutter run` will use build number 0 (default), which is fine
# for development — only release builds need the monotonic value.
version: 1.3.1 # x-release-please-version

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client. We use the IOHttpClientAdapter to plug in a
  # dart:io HttpClient configured with our private CA + client cert.
  dio: ^5.7.0

  # Riverpod 3.x — picked over Provider/BLoC after the M5 research
  # round. Free async caching, dispose semantics, no boilerplate at
  # this scale.
  flutter_riverpod: ^3.0.0

  # Bandwidth time-series visualization for /v1/peers/{pubkey}/bandwidth.
  fl_chart: ^0.70.0

  # WireGuard client config QR rendering for the create-peer flow.
  qr_flutter: ^4.1.0

  # Read the bundle's CFBundleShortVersionString / version code at
  # runtime so the footer + Settings + auto-updater know what we are.
  package_info_plus: ^8.1.0

  # Locate ~/Downloads so the auto-updater can drop the DMG there.
  path_provider: ^2.1.5

  # Crypto for SHA256 verification of the downloaded DMG before we
  # ask Finder to open it.
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
